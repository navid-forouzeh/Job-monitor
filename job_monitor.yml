name: Job Monitor

on:
  schedule:
    # Läuft jeden Tag um 08:00 und 18:00 Uhr (Schweizer Zeit: UTC+1/+2)
    - cron: '0 7,17 * * *'  # 08:00 und 18:00 Uhr Schweizer Zeit (Winter)
  
  workflow_dispatch:  # Ermöglicht manuelles Ausführen

jobs:
  search-jobs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run Job Monitor
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python job_monitor.py
    
    - name: Commit Database Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add jobs.db || true
        git commit -m "Update seen jobs database" || true
    
    - name: Push Changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        branch: main
